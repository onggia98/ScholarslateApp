version: "3.9"

services:
  postgres:
    # pgvector/pgvector image đã bao gồm PostgreSQL 16 + pgvector extension
    # Dùng tag cụ thể để tránh breaking changes khi image update
    image: pgvector/pgvector:pg16
    container_name: papertracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: papertracker
      POSTGRES_USER: papertracker
      POSTGRES_PASSWORD: papertracker123
    ports:
      # host:container — đổi port host nếu bị conflict
      - "5433:5432"
    volumes:
      # Persist dữ liệu qua các lần restart container
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papertracker -d papertracker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
