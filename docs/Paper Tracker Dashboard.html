/* ---------- Auth helpers ---------- */
function getStoredToken() {
  return localStorage.getItem('token') || sessionStorage.getItem('token') || null;
}

function clearAuth() {
  ['token', 'role'].forEach(k => {
    localStorage.removeItem(k);
    sessionStorage.removeItem(k);
  });
}

function decodeJwt(token) {
  if (!token || typeof token !== 'string') return null;
  const parts = token.split('.');
  if (parts.length < 2) return null;
  try {
    let b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    const json = decodeURIComponent(
      atob(b64).split('').map(c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
      ).join('')
    );
    return JSON.parse(json);
  } catch (_) { return null; }
}

function emailToInitials(email) {
  if (!email) return 'U';
  const local = String(email).split('@')[0] || '';
  const parts = local.split(/[._\-+]+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return 'U';
}

/* ---------- API config ---------- */
// Vite-style env if available, else fall back to localhost.
const API_BASE = (
  (typeof import_meta !== 'undefined' && import_meta.env && import_meta.env.VITE_API_BASE_URL) ||
  (typeof window !== 'undefined' && window.VITE_API_BASE_URL) ||
  'http://localhost:8081/api'
);

async function fetchPapers() {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/papers', {
    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
  });
  if (res.status === 401) { const e = new Error('Unauthorized'); e.code = 401; throw e; }
  if (!res.ok) throw new Error('Failed to load papers');
  return res.json();
}

async function fetchFavorites() {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/favorites', {
    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
  });
  if (res.status === 401) { const e = new Error('Unauthorized'); e.code = 401; throw e; }
  if (!res.ok) throw new Error('Failed to load favorites');
  return res.json();
}

async function addFavorite(paperId) {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/favorites', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
    },
    body: JSON.stringify({ paper_id: paperId }),
  });
  if (res.status === 401) { const e = new Error('Unauthorized'); e.code = 401; throw e; }
  if (!res.ok) throw new Error('Failed to add favorite');
}

async function removeFavorite(paperId) {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/favorites/' + encodeURIComponent(paperId), {
    method: 'DELETE',
    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
  });
  if (res.status === 401) { const e = new Error('Unauthorized'); e.code = 401; throw e; }
  if (!res.ok && res.status !== 204) throw new Error('Failed to remove favorite');
}

}

}

async function searchPapers(query) {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/papers/search?q=' + encodeURIComponent(query), {
    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
  });
  if (res.status === 401) { const e = new Error('Unauthorized'); e.code = 401; throw e; }
  if (!res.ok) {
    const err = new Error('Failed to search papers: ' + res.status);
    err.code = res.status;
    throw err;
  }
  return res.json();
}

async function fetchTopics() {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/topics', {
    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
  });
  if (!res.ok) {
    const err = new Error('Failed to fetch topics: ' + res.status);
    err.code = res.status;
    throw err;
  }
  return res.json();
}

async function createTopic(payload) {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/topics', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
    },
    body: JSON.stringify(payload),
  });
  if (!res.ok) {
    let msg = 'Failed to create topic';
    try { const data = await res.json(); if (data && data.message) msg = data.message; } catch (_) {}
    const err = new Error(msg);
    err.code = res.status;
    throw err;
  }
  return res.json();
}

async function updateTopic(id, payload) {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/topics/' + encodeURIComponent(id), {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
    },
    body: JSON.stringify(payload),
  });
  if (!res.ok) {
    const err = new Error('Failed to update topic: ' + res.status);
    err.code = res.status;
    throw err;
  }
  // Some backends return 204
  try { return await res.json(); } catch (_) { return null; }
}

async function deleteTopic(id) {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/topics/' + encodeURIComponent(id), {
    method: 'DELETE',
    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
  });
  if (!res.ok) {
    const err = new Error('Failed to delete topic: ' + res.status);
    err.code = res.status;
    throw err;
  }
  return true;
}

async function fetchTrend(topicId) {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/papers/stats/trend?topicId=' + encodeURIComponent(topicId), {
    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
  });
  if (!res.ok) {
    const err = new Error('Failed to fetch trend: ' + res.status);
    err.code = res.status;
    throw err;
  }
  return res.json();
}

async function markNotificationRead(id) {
  const token = getStoredToken();
  const res = await fetch(API_BASE + '/notifications/' + encodeURIComponent(id) + '/read', {
    method: 'PUT',
    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
  });
  if (res.status === 401) { const e = new Error('Unauthorized'); e.code = 401; throw e; }
  if (!res.ok) throw new Error('Failed to mark notification read');
}

// Wait for lucide ESM to finish loading
function useLucide() {
  const [ready, setReady] = useState(!!window.Lucide);
  useEffect(() => {
    if (window.Lucide) return;
    const onReady = () => setReady(true);
    window.addEventListener('lucide-ready', onReady);
    return () => window.removeEventListener('lucide-ready', onReady);
  }, []);
  return ready ? window.Lucide : null;
}

  if (!t) return 0;
  if (typeof t.keyword_count === 'number') return t.keyword_count;

/* ---------- Helpers ---------- */
function timeAgo(iso) {
  const now = Date.now();
  const t = new Date(iso).getTime();
  const s = Math.max(1, Math.round((now - t) / 1000));
  if (s < 60) return s + 's ago';
  const m = Math.round(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.round(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.round(h / 24);
  return d + 'd ago';
}
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}
function scoreColor(score) {
  if (score == null) return { bg: 'bg-slate-100', text: 'text-slate-500', border: 'border-slate-200', dot: 'bg-slate-400' };
  if (score >= 8) return { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200', dot: 'bg-emerald-500' };
  if (score >= 5) return { bg: 'bg-amber-50', text: 'text-amber-700', border: 'border-amber-200', dot: 'bg-amber-500' };
  return { bg: 'bg-rose-50', text: 'text-rose-700', border: 'border-rose-200', dot: 'bg-rose-500' };
}
function authorString(authors) {
  // Authors comes in as a plain string from the API ("A, B, C"). Trim, cap to 3 names.
  if (!authors) return '';
  if (Array.isArray(authors)) {
    if (authors.length <= 3) return authors.join(', ');
    return authors.slice(0, 3).join(', ') + ' +' + (authors.length - 3);
  }
  const parts = String(authors).split(',').map(s => s.trim()).filter(Boolean);
  if (parts.length <= 3) return parts.join(', ');
  return parts.slice(0, 3).join(', ') + ' +' + (parts.length - 3);
}

function authorsLower(authors) {
  if (!authors) return '';
  if (Array.isArray(authors)) return authors.join(' ').toLowerCase();
  return String(authors).toLowerCase();
}

/* ---------- Tiny atoms ---------- */
function Badge({ children, tone = 'slate', icon: Icon, className = '' }) {
  const tones = {
    slate: 'bg-slate-100 text-slate-700 border-slate-200',
    blue:  'bg-blue-50 text-blue-700 border-blue-200',
    amber: 'bg-amber-50 text-amber-800 border-amber-200',
    rose:  'bg-rose-50 text-rose-700 border-rose-200',
    emerald: 'bg-emerald-50 text-emerald-700 border-emerald-200',
    indigo: 'bg-indigo-50 text-indigo-700 border-indigo-200',
  };
  return (
    <span className={"inline-flex items-center gap-1 px-2 py-0.5 rounded-md border text-xs font-medium " + tones[tone] + " " + className}>
      {Icon ? <Icon className="w-3 h-3" /> : null}
      {children}
    </span>
  );
}

function IconBtn({ icon: Icon, label, onClick, active = false, badge = null, className = '' }) {
  return (
    <button
      onClick={onClick}
      aria-label={label}
      title={label}
      className={
        "relative inline-flex items-center justify-center w-9 h-9 rounded-lg border text-slate-600 hover:text-slate-900 transition-colors " +
        (active ? "bg-slate-900 text-white border-slate-900 hover:text-white " : "bg-white border-slate-200 hover:bg-slate-50 ") +
        className
      }
    >
      <Icon className="w-[18px] h-[18px]" />
      {badge != null && badge > 0 ? (
        <span className="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 inline-flex items-center justify-center rounded-full bg-rose-500 text-white text-[10px] font-semibold ring-2 ring-white">
          {badge > 99 ? '99+' : badge}
        </span>
      ) : null}
    </button>
  );
}

/* ---------- Topbar ---------- */
function Topbar({ L, onMobileMenu, query, onQuery, onSubmitQuery, notifications, onMarkAllRead, onMarkOneRead, onOpenNotifications, onNavigate, onOpenPaper, user, onLogout }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [notifOpen, setNotifOpen] = useState(false);
  const [notifTab, setNotifTab] = useState('all');
  const menuRef = useRef(null);
  const notifRef = useRef(null);

  const unreadCount = notifications.filter(n => !n.is_read).length;
  const visibleNotifs = notifTab === 'unread' ? notifications.filter(n => !n.is_read) : notifications;

  useEffect(() => {
    const onDocClick = (e) => {
      if (menuOpen && menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false);
      if (notifOpen && notifRef.current && !notifRef.current.contains(e.target)) setNotifOpen(false);
    };
    const onKey = (e) => { if (e.key === 'Escape') { setMenuOpen(false); setNotifOpen(false); } };
    document.addEventListener('mousedown', onDocClick);
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('mousedown', onDocClick);
      document.removeEventListener('keydown', onKey);
    };
  }, [menuOpen, notifOpen]);

  const MenuItem = ({ icon: Icon, label, shortcut, danger = false, onClick }) => (
    <button
      onClick={() => { setMenuOpen(false); onClick && onClick(); }}
      className={
        "w-full flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-colors " +
        (danger
          ? "text-rose-600 hover:bg-rose-50"
          : "text-slate-700 hover:bg-slate-100 hover:text-slate-900")
      }
    >
      <Icon className="w-4 h-4 flex-shrink-0" />
      <span className="flex-1 text-left">{label}</span>
      {shortcut ? (
        <kbd className="text-[10px] text-slate-400 font-mono">{shortcut}</kbd>
      ) : null}
    </button>
  );

  return (
    <header className="h-16 bg-white/80 backdrop-blur border-b border-slate-200 sticky top-0 z-20 flex items-center px-4 lg:px-6 gap-3">
      <button
        onClick={onMobileMenu}
        className="lg:hidden w-9 h-9 inline-flex items-center justify-center rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50"
        aria-label="Open menu"
      >
        <L.Menu className="w-[18px] h-[18px]" />
      </button>

      {/* Search */}
      <form onSubmit={(e) => { e.preventDefault(); onSubmitQuery && onSubmitQuery(query); }} className="flex-1 max-w-2xl relative">
        <L.Search className="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" />
        <input
          value={query}
          onChange={(e) => onQuery(e.target.value)}
          placeholder="Search papers, authors, arXiv IDs…"
          className="w-full h-10 pl-9 pr-20 rounded-lg border border-slate-200 bg-white text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-400"
        />
        <kbd className="hidden sm:inline-flex absolute right-3 top-1/2 -translate-y-1/2 items-center gap-1 px-1.5 py-0.5 rounded border border-slate-200 bg-slate-50 text-[10px] font-medium text-slate-500">
          <span>⌘</span><span>K</span>
        </kbd>
      </form>

      <div className="flex items-center gap-2 ml-auto">
        {/* Notifications */}
        <div className="relative" ref={notifRef}>
          <button
            onClick={() => { setNotifOpen(o => !o); setMenuOpen(false); }}
            aria-label="Notifications"
            aria-haspopup="menu"
            aria-expanded={notifOpen}
            className={
              "relative inline-flex items-center justify-center w-9 h-9 rounded-lg border transition-colors " +

                ? "bg-slate-900 text-white border-slate-900"
                : "bg-white border-slate-200 text-slate-600 hover:text-slate-900 hover:bg-slate-50")
            }
          >
            <L.Bell className="w-[18px] h-[18px]" />
            {unreadCount > 0 ? (
              <span className="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 inline-flex items-center justify-center rounded-full bg-rose-500 text-white text-[10px] font-semibold ring-2 ring-white">
                {unreadCount > 99 ? '99+' : unreadCount}
              </span>
            ) : null}
          </button>

          {notifOpen ? (
            <div
              role="menu"
              className="absolute right-0 top-full mt-2 w-[380px] max-w-[calc(100vw-1.5rem)] bg-white border border-slate-200 rounded-xl shadow-lg ring-1 ring-slate-900/5 z-30 overflow-hidden"
            >
              {/* Header */}
              <div className="px-4 py-3 flex items-center justify-between border-b border-slate-100">
                <div className="flex items-center gap-2">
                  <span className="text-sm font-semibold text-slate-900">Thông báo</span>
                  {unreadCount > 0 ? (
                    <span className="px-1.5 py-0.5 rounded-md bg-rose-50 text-rose-600 text-[10px] font-semibold">

                  ) : null}
                </div>
                <button
                  onClick={onMarkAllRead}
                  disabled={unreadCount === 0}
                  className="text-[12px] text-slate-600 hover:text-slate-900 font-medium disabled:text-slate-300 disabled:cursor-not-allowed inline-flex items-center gap-1"
                >
                  <L.CheckCheck className="w-3.5 h-3.5" />

                </button>
              </div>

              {/* Tabs */}
              <div className="px-3 pt-2 pb-1 flex items-center gap-1 border-b border-slate-100">
                <button
                  onClick={() => setNotifTab('all')}
                  className={"px-2.5 py-1 rounded-md text-[12px] font-medium " + (notifTab === 'all' ? "bg-slate-100 text-slate-900" : "text-slate-500 hover:text-slate-900 hover:bg-slate-50")}
                >
                  Tất cả
                </button>
                <button
                  onClick={() => setNotifTab('unread')}
                  className={"px-2.5 py-1 rounded-md text-[12px] font-medium inline-flex items-center gap-1 " + (notifTab === 'unread' ? "bg-slate-100 text-slate-900" : "text-slate-500 hover:text-slate-900 hover:bg-slate-50")}
                >
                  Chưa đọc
                  {unreadCount > 0 ? (
                    <span className={"text-[10px] px-1 rounded font-semibold " + (notifTab === 'unread' ? "bg-rose-500 text-white" : "bg-rose-50 text-rose-600")}>
                      {unreadCount}
                    </span>
                  ) : null}
                </button>
              </div>

              {/* List */}
              <div className="max-h-[420px] overflow-y-auto py-1">
                {visibleNotifs.length === 0 ? (
                  <div className="py-12 text-center text-sm text-slate-400">
                    {notifTab === 'unread' ? 'Bạn đã xem hết thông báo.' : 'Không có thông báo nào.'}
                  </div>
                ) : visibleNotifs.map(n => (
                    <button
                      key={n.id}
                      onClick={() => {
                        if (!n.is_read) onMarkOneRead(n.id);
                        setNotifOpen(false);
                        if (n.paper_id && onOpenPaper) onOpenPaper(n.paper_id);
                      }}
                      className={
                        "w-full flex items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-slate-50 relative " +
                        (!n.is_read ? "bg-blue-50/40" : "")
                      }
                    >
                      <span className="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-100 to-indigo-200 inline-flex items-center justify-center flex-shrink-0">
                        <L.FileText className="w-4 h-4 text-indigo-700" />
                      </span>

                      <div className="min-w-0 flex-1">
                        <p className="text-[13px] text-slate-800 leading-snug line-clamp-2">{n.message}</p>
                        <div className="mt-1 flex items-center gap-2 text-[11px] text-slate-500">
                          <span className="px-1.5 py-0.5 rounded bg-slate-100 text-slate-600 font-medium">{n.type}</span>
                          <span className="text-slate-300">·</span>
                          <span>{timeAgo(n.created_at)}</span>
                        </div>
                      </div>

                      {!n.is_read ? (
                        <span className="w-2 h-2 rounded-full bg-blue-500 flex-shrink-0 mt-3" aria-label="Unread" />

                <span className="text-[11px] text-slate-500">Tự động cập nhật mỗi 06:00 UTC</span>
                <button
                  onClick={() => { setNotifOpen(false); onOpenNotifications && onOpenNotifications(); }}
                  className="text-[12px] text-slate-700 font-medium hover:text-slate-900 inline-flex items-center gap-1"
                >
                  Xem tất cả
                  <L.ArrowRight className="w-3 h-3" />
                </button>
              </div>
            </div>
          ) : null}
        </div>

        <div className="hidden sm:block w-px h-6 bg-slate-200 mx-1" />

        {/* User menu */}
        <div className="relative" ref={menuRef}>
          <button
            onClick={() => setMenuOpen(o => !o)}
            aria-haspopup="menu"
            aria-expanded={menuOpen}
            className={
              "hidden sm:flex items-center gap-2 pl-1 pr-2 py-1 rounded-lg transition-colors " +
              (menuOpen ? "bg-slate-100" : "hover:bg-slate-50")

              {user?.initials || 'U'}
            </span>
            <span className="text-left leading-tight">
              <span className="block text-sm font-medium text-slate-900 max-w-[160px] truncate">{user?.email || 'User'}</span>
              <span className="block text-[11px] text-slate-500">Signed in</span>
            </span>
            <L.ChevronDown className={"w-3.5 h-3.5 text-slate-400 transition-transform " + (menuOpen ? "rotate-180" : "")} />
          </button>

          <button
            onClick={() => setMenuOpen(o => !o)}
            className="sm:hidden w-9 h-9 rounded-full bg-gradient-to-br from-slate-700 to-slate-900 text-white text-xs font-semibold inline-flex items-center justify-center"
            aria-haspopup="menu"
            aria-expanded={menuOpen}
          >
            {user?.initials || 'U'}

          {menuOpen ? (
            <div

              <div className="px-3 py-2 flex items-center gap-2.5 border-b border-slate-100 mb-1">
                <span className="w-9 h-9 rounded-full bg-gradient-to-br from-slate-700 to-slate-900 text-white text-xs font-semibold inline-flex items-center justify-center flex-shrink-0">
                  {user?.initials || 'U'}
                </span>
                <div className="leading-tight min-w-0">
                  <div className="text-sm font-medium text-slate-900 truncate">{user?.email || 'User'}</div>
                  <div className="text-[11px] text-slate-500 truncate">Signed in</div>
                </div>
                <span className="ml-auto px-1.5 py-0.5 rounded text-[10px] font-semibold bg-slate-100 text-slate-600">USER</span>

              <div className="px-1.5 space-y-0.5">

  );

/* ---------- PaperCard ---------- */
function PaperCard({ L, paper, onToggleFavorite, focused, onFocusConsumed }) {
  const [expanded, setExpanded] = useState(false);
  const [flash, setFlash] = useState(false);
  const cardRef = useRef(null);
  const score = scoreColor(paper.quality_score);
  const isFailed = paper.processing_status === 'FAILED';

  // When this card gains focus, expand + scroll + flash. When focus moves to another card,
  // collapse this one again so only the focused paper is open.
  useEffect(() => {
    if (focused) {
      setExpanded(true);
      setFlash(true);
      const el = cardRef.current;
      if (el) {
        const scroller = el.closest('.feed-scroll') || el.parentElement;
        if (scroller && scroller.scrollTo) {
          const top = el.offsetTop - 16;
          scroller.scrollTo({ top, behavior: 'smooth' });
        }
      }
      const t = setTimeout(() => { setFlash(false); onFocusConsumed && onFocusConsumed(); }, 1800);
      return () => clearTimeout(t);
    } else {
      // Was focused, no longer is → collapse so the next focus target reads as the only-expanded card.
      setExpanded(false);
      setFlash(false);
    }
  }, [focused]);

  return (
    <article
      ref={cardRef}
      data-paper-id={paper.id}
      className={
        "bg-white border rounded-xl overflow-hidden transition-all hover:shadow-sm " +
        (flash ? "ring-2 ring-slate-900/30 shadow-md " : "") +
        (isFailed ? "border-rose-200" : paper.is_duplicate ? "border-amber-200" : "border-slate-200")
      }
    >
      {/* Status strip */}
      {isFailed ? (
        <div className="px-5 py-2 bg-rose-50 border-b border-rose-200 flex items-center gap-2 text-xs text-rose-800">
          <L.AlertTriangle className="w-3.5 h-3.5 flex-shrink-0" />
          <span className="font-semibold">AI processing failed</span>
          <span className="text-rose-700/80 truncate">· {paper.last_error}</span>
          <span className="ml-auto text-[11px] text-rose-700/80 flex-shrink-0">retry {paper.retry_count}/3 · last {timeAgo(paper.last_retry_at)}</span>
        </div>
      ) : null}
      {paper.is_duplicate ? (
        <div className="px-5 py-2 bg-amber-50 border-b border-amber-200 flex items-center gap-2 text-xs text-amber-800">
          <L.Copy className="w-3.5 h-3.5 flex-shrink-0" />
          <span className="font-semibold">Duplicate detected</span>
          <span className="text-amber-700/80 truncate">· cosine distance &lt; 0.05 to <span className="font-mono">{paper.original_paper_id}</span></span>

  const [error, setError] = useState(null);

  useEffect(() => {
    if (initialQuery) { setQ(initialQuery); setSubmitted(initialQuery); }
  }, [initialQuery]);

  useEffect(() => {
    const term = submitted.trim();
    if (!term) { setResults([]); setLoading(false); setError(null); return; }
    let cancelled = false;
    setLoading(true);
    setError(null);
    searchPapers(term)
      .then(data => {
        if (cancelled) return;
        setResults(Array.isArray(data) ? data : []);
        setLoading(false);
      })

        if (cancelled) return;
        if (err && err.code === 401) { onAuthError && onAuthError(); return; }

/* ---------- Trends View ---------- */
function TrendsView({ L, onAuthError }) {
  const [topics, setTopics] = useState([]);
  const [topicsLoading, setTopicsLoading] = useState(true);
  const [topicsError, setTopicsError] = useState(null);
  const [selectedTopicId, setSelectedTopicId] = useState(null);
  const [trend, setTrend] = useState([]);
  const [trendLoading, setTrendLoading] = useState(false);
  const [trendError, setTrendError] = useState(null);

  // Load topics on mount.
  useEffect(() => {
    let cancelled = false;
    setTopicsLoading(true);
    setTopicsError(null);
    fetchTopics()
      .then(data => {
        if (cancelled) return;
        const list = Array.isArray(data) ? data : [];
        setTopics(list);
        if (list.length > 0) setSelectedTopicId(list[0].id);
        setTopicsLoading(false);
      })
      .catch(err => {
        if (cancelled) return;
        if (err && err.code === 401) { onAuthError && onAuthError(); return; }
        setTopicsError('Failed to load topics');
        setTopicsLoading(false);
      });
    return () => { cancelled = true; };
  }, []);

  // Load trend whenever the selected topic changes.
  useEffect(() => {
    if (!selectedTopicId) return;
    let cancelled = false;
    setTrendLoading(true);
    setTrendError(null);
    fetchTrend(selectedTopicId)
      .then(data => {
        if (cancelled) return;
        setTrend(Array.isArray(data) ? data : []);
        setTrendLoading(false);
      })
      .catch(err => {
        if (cancelled) return;
        if (err && err.code === 401) { onAuthError && onAuthError(); return; }
        setTrendError('Failed to load trend data');
        setTrendLoading(false);
      });
    return () => { cancelled = true; };
  }, [selectedTopicId]);

  // Build last-12-month axis ending at the most recent month in the data
  // (or the current month if data is empty). Pad missing months with 0.
  const series = useMemo(() => {
    const map = new Map();
    trend.forEach(d => map.set(d.month, d.count));
    const today = new Date();
    let end = today;
    if (trend.length > 0) {
      // Use latest month from data so we don't show empty future months.
      const latest = trend.map(d => d.month).sort().slice(-1)[0];
      const [yy, mm] = latest.split('-').map(n => parseInt(n, 10));
      end = new Date(yy, mm - 1, 1);
    }
    const out = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(end.getFullYear(), end.getMonth() - i, 1);
      const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      const label = d.toLocaleString('en-US', { month: 'short' });
      out.push({ key, label, count: map.get(key) || 0 });
    }
    return out;
  }, [trend]);

  const selectedTopic = topics.find(t => t.id === selectedTopicId);
  const topicColor = '#6366f1';
  const max = Math.max(1, ...series.map(s => s.count));
  const total = series.reduce((s, p) => s + p.count, 0);
  const lastCount = series.length ? series[series.length - 1].count : 0;
  const prevCount = series.length > 1 ? series[series.length - 2].count : 0;
  const delta = lastCount - prevCount;
  const peak = series.reduce((acc, p) => p.count > acc.count ? p : acc, { count: -1, label: '—' });

  const W = 720, H = 220, P = 28;
  const xStep = series.length > 1 ? (W - P * 2) / (series.length - 1) : 0;
  const yScale = (v) => H - P - (v / max) * (H - P * 2);

  return (
    <>
      <PageHeader
        title="Trends"
        subtitle="Paper volume by topic over the last 12 months (max history: 2 years)."
      />

      {/* Topic selector */}
      <div className="bg-white border border-slate-200 rounded-xl p-4 mb-4 flex flex-col sm:flex-row sm:items-center gap-3">
        <div className="flex items-center gap-2">
          <L.Tag className="w-4 h-4 text-slate-500" />
          <span className="text-sm font-medium text-slate-700">Topic</span>
        </div>
        <div className="relative flex-1 max-w-md">
          <select
            value={selectedTopicId || ''}
            onChange={(e) => setSelectedTopicId(e.target.value)}
            disabled={topicsLoading || topics.length === 0}
            className="appearance-none w-full h-10 pl-3 pr-9 rounded-lg border border-slate-200 bg-white text-sm text-slate-900 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-900/10 disabled:opacity-60"
          >
            {topicsLoading ? (
              <option>Loading topics…</option>
            ) : topics.length === 0 ? (
              <option>No topics yet</option>
            ) : topics.map(t => (
              <option key={t.id} value={t.id}>{t.name}</option>
            ))}
          </select>

            <span className="w-2 h-2 rounded-full" style={{ background: topicColor }} />

          <div className="h-[220px] flex items-center justify-center text-sm text-slate-400">Loading trend…</div>

          <div className="h-[220px] flex items-center justify-center text-sm text-rose-600">{trendError}</div>
        ) : !selectedTopicId ? (
          <div className="h-[220px] flex items-center justify-center text-sm text-slate-400">Select a topic to view its trend.</div>
        ) : (
          <div className="overflow-x-auto">
            <svg viewBox={`0 0 ${W} ${H}`} className="w-full min-w-[600px] h-[220px]">
              {/* grid */}
              {[0, 0.25, 0.5, 0.75, 1].map((p, i) => (
                <line key={i} x1={P} x2={W-P} y1={P + (H-P*2)*p} y2={P + (H-P*2)*p} stroke="#f1f5f9" strokeWidth={1} />
              ))}
              {/* y labels (max & 0) */}
              <text x={P - 6} y={P + 4} textAnchor="end" fontSize="10" fill="#94a3b8">{max}</text>
              <text x={P - 6} y={H - P + 4} textAnchor="end" fontSize="10" fill="#94a3b8">0</text>
              {/* x labels */}
              {series.map((m, i) => (
                <text key={m.key} x={P + i * xStep} y={H - 6} textAnchor="middle" fontSize="10" fill="#94a3b8">{m.label}</text>

              {/* area fill */}
              {series.length > 1 ? (() => {
                const path =
                  `M ${P} ${H - P} ` +
                  series.map((m, i) => `L ${P + i * xStep} ${yScale(m.count)}`).join(' ') +
                  ` L ${P + (series.length - 1) * xStep} ${H - P} Z`;
                return <path d={path} fill={topicColor} fillOpacity="0.08" />;
              })() : null}
              {/* line + dots */}
              {series.length > 1 ? (
                <path
                  d={series.map((m, i) => `${i === 0 ? 'M' : 'L'} ${P + i * xStep} ${yScale(m.count)}`).join(' ')}
                  fill="none" stroke={topicColor} strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round"
                />
              ) : null}
              {series.map((m, i) => (
                <g key={m.key}>
                  <circle cx={P + i * xStep} cy={yScale(m.count)} r={3.5} fill="white" stroke={topicColor} strokeWidth={2} />
                  {m.count > 0 ? (
                    <text x={P + i * xStep} y={yScale(m.count) - 8} textAnchor="middle" fontSize="10" fontWeight="600" fill="#475569">{m.count}</text>
                  ) : null}
                </g>
              ))}
            </svg>
          </div>
        )}
      </div>

      {/* Monthly breakdown */}
      <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div className="px-5 py-3 border-b border-slate-100 flex items-center justify-between">
          <div className="text-sm font-semibold text-slate-900">Monthly breakdown</div>

            <div className="px-5 py-6 text-sm text-slate-400 text-center">No data.</div>
          ) : series.slice().reverse().map(m => (
            <div key={m.key} className="px-5 py-2.5 flex items-center gap-3">
              <span className="w-16 text-[12px] font-mono text-slate-500">{m.key}</span>

              </div>
              <span className="w-10 text-right text-sm tabular-nums font-medium text-slate-900">{m.count}</span>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

/* ---------- Topics Manager ---------- */
function TopicsManager({ L, open, onClose, topics, onChange, onAuthError }) {
  const [busy, setBusy] = useState(null); // id or 'create'
  const [error, setError] = useState(null);
  const [name, setName] = useState('');
  const [keywords, setKeywords] = useState('');
  const dialogRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  if (!open) return null;

  const atCap = topics.length >= TOPIC_LIMIT;
  const newKwCount = keywords.split(',').map(s => s.trim()).filter(Boolean).length;
  const canCreate = !!name.trim() && !!keywords.trim() && newKwCount <= 5 && !atCap;

  const handleAuth = (err) => {
    if (err && err.code === 401) { onAuthError && onAuthError(); return true; }
    return false;
  };

  const submitCreate = async (e) => {
    e.preventDefault();
    if (!canCreate) return;
    setBusy('create');
    setError(null);
    try {
      const created = await createTopic({ name: name.trim(), keywords: keywords.trim() });
      // Append (or refresh from server if shape differs).
      const next = created && created.id
        ? [...topics, created]
        : [...topics, { id: 'tmp-' + Date.now(), name: name.trim(), keywords: keywords.trim(), is_active: true }];
      onChange(next);
      setName('');
      setKeywords('');
    } catch (err) {
      if (handleAuth(err)) return;
      setError(err.message || 'Failed to create topic');
    } finally {
      setBusy(null);
    }
  };

  const toggleActive = async (t) => {
    setBusy(t.id);
    setError(null);
    const prev = topics;
    const optimistic = topics.map(x => x.id === t.id ? { ...x, is_active: !x.is_active } : x);
    onChange(optimistic);
    try {
      await updateTopic(t.id, { is_active: !t.is_active });
    } catch (err) {
      onChange(prev);
      if (handleAuth(err)) return;
      setError(err.message || 'Failed to update topic');
    } finally {
      setBusy(null);
    }
  };

  const removeTopic = async (t) => {
    if (!confirm(`Delete topic "${t.name}"? This cannot be undone.`)) return;
    setBusy(t.id);
    setError(null);
    const prev = topics;
    onChange(topics.filter(x => x.id !== t.id));
    try {
      await deleteTopic(t.id);
    } catch (err) {
      onChange(prev);
      if (handleAuth(err)) return;
      setError(err.message || 'Failed to delete topic');
    } finally {
      setBusy(null);
    }
  };

  return (
    <div
      className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/40 backdrop-blur-sm p-0 sm:p-6"
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}
    >
      <div
        ref={dialogRef}
        role="dialog"
        aria-modal="true"
        className="bg-white w-full sm:max-w-2xl rounded-t-2xl sm:rounded-2xl shadow-xl ring-1 ring-slate-900/5 max-h-[90vh] flex flex-col"
      >
        {/* Header */}
        <div className="px-5 py-4 border-b border-slate-100 flex items-center gap-3">
          <span className="w-9 h-9 rounded-lg bg-slate-900 text-white inline-flex items-center justify-center flex-shrink-0">
            <L.Tag className="w-[18px] h-[18px]" />
          </span>
          <div className="min-w-0 flex-1">
            <div className="text-base font-semibold text-slate-900">Manage topics</div>
            <div className="text-[12px] text-slate-500">
              <span className="font-medium text-slate-700">{topics.length}</span> / {TOPIC_LIMIT} topics · 5 keywords each
            </div>
          </div>
          <button
            onClick={onClose}
            aria-label="Close"
            className="w-8 h-8 inline-flex items-center justify-center rounded-md text-slate-500 hover:bg-slate-100 hover:text-slate-900"
          >
            <L.X className="w-[18px] h-[18px]" />
          </button>
        </div>

        {/* Body */}
        <div className="flex-1 overflow-y-auto">
          {/* Create form */}
          <form onSubmit={submitCreate} className="px-5 py-4 border-b border-slate-100 bg-slate-50/60">
            <div className="text-[11px] font-semibold uppercase tracking-wider text-slate-500 mb-2">Add new topic</div>
            <div className="grid grid-cols-1 sm:grid-cols-[1fr_1.5fr_auto] gap-2 items-start">
              <input
                value={name}
                onChange={(e) => setName(e.target.value)}
                disabled={atCap}
                placeholder="e.g. Mixture-of-Experts"
                className="h-10 px-3 rounded-lg border border-slate-200 bg-white text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-400 disabled:bg-slate-100 disabled:text-slate-400"
              />
              <div>
                <input
                  value={keywords}
                  onChange={(e) => setKeywords(e.target.value)}
                  disabled={atCap}
                  placeholder="kw1, kw2, kw3 (comma-separated, max 5)"
                  className="w-full h-10 px-3 rounded-lg border border-slate-200 bg-white text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-400 disabled:bg-slate-100 disabled:text-slate-400"
                />
                <div className={"mt-1 text-[11px] " + (newKwCount > 5 ? "text-rose-600" : "text-slate-500")}>
                  {newKwCount} / 5 keywords
                </div>
              </div>
              <button
                type="submit"
                disabled={!canCreate || busy === 'create'}
                className="h-10 px-4 rounded-lg bg-slate-900 text-white text-sm font-medium hover:bg-slate-800 disabled:bg-slate-300 disabled:cursor-not-allowed inline-flex items-center justify-center gap-1.5"
              >
                {busy === 'create' ? (
                  <L.Loader2 className="w-4 h-4 animate-spin" />
                ) : (
                  <L.Plus className="w-4 h-4" />
                )}
                Add topic
              </button>
            </div>
            {atCap ? (
              <div className="mt-2 text-[12px] text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 inline-flex items-center gap-1.5">
                <L.AlertTriangle className="w-3.5 h-3.5" />
                Topic limit reached. Delete a topic to add a new one.
              </div>
            ) : null}
          </form>

          {error ? (
            <div className="mx-5 mt-4 px-3 py-2 rounded-lg bg-rose-50 border border-rose-200 text-[13px] text-rose-700 inline-flex items-start gap-2">
              <L.AlertCircle className="w-4 h-4 flex-shrink-0 mt-0.5" />
              <span>{error}</span>
            </div>
          ) : null}

          {/* Topic list */}
          <div className="px-5 py-3">
            <div className="text-[11px] font-semibold uppercase tracking-wider text-slate-500 mb-2">Your topics</div>
            {topics.length === 0 ? (
              <div className="py-10 text-center text-sm text-slate-400">No topics yet. Add one above.</div>
            ) : (
              <ul className="space-y-2">
                {topics.map(t => {
                  const isBusy = busy === t.id;
                  return (
                    <li key={t.id} className="border border-slate-200 rounded-xl p-3 flex items-start gap-3">
                      <span className={
                        "w-1.5 h-1.5 rounded-full flex-shrink-0 mt-2 " +
                        (t.is_active ? "bg-emerald-500" : "bg-slate-300")
                      } />
                      <div className="min-w-0 flex-1">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="text-sm font-semibold text-slate-900 truncate">{t.name}</span>
                          <span className={
                            "text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded " +
                            (t.is_active ? "bg-emerald-50 text-emerald-700" : "bg-slate-100 text-slate-500")
                          }>
                            {t.is_active ? 'Active' : 'Paused'}
                          </span>
                          <span className="text-[11px] text-slate-500">{kwCount(t)} kw</span>
                        </div>
                        {t.keywords ? (
                          <div className="mt-1.5 flex flex-wrap gap-1">
                            {t.keywords.split(',').map(s => s.trim()).filter(Boolean).map(kw => (
                              <span key={kw} className="inline-flex items-center px-1.5 py-0.5 rounded bg-slate-100 text-[11px] text-slate-700 font-mono">
                                {kw}
                              </span>
                            ))}
                          </div>
                        ) : null}
                      </div>

                      {/* Toggle */}
                      <button
                        onClick={() => toggleActive(t)}
                        disabled={isBusy}
                        role="switch"
                        aria-checked={t.is_active}
                        title={t.is_active ? 'Pause topic' : 'Activate topic'}
                        className={
                          "relative inline-flex h-5 w-9 flex-shrink-0 items-center rounded-full transition-colors disabled:opacity-50 " +
                          (t.is_active ? "bg-emerald-500" : "bg-slate-300")
                        }
                      >
                        <span className={
                          "inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform " +
                          (t.is_active ? "translate-x-4" : "translate-x-0.5")
                        } />
                      </button>

                      {/* Delete */}
                      <button
                        onClick={() => removeTopic(t)}
                        disabled={isBusy}
                        title="Delete topic"
                        className="w-8 h-8 inline-flex items-center justify-center rounded-md text-slate-400 hover:text-rose-600 hover:bg-rose-50 disabled:opacity-50"
                      >
                        {isBusy ? (
                          <L.Loader2 className="w-4 h-4 animate-spin" />
                        ) : (
                          <L.Trash2 className="w-4 h-4" />
                        )}
                      </button>
                    </li>
                  );
                })}
              </ul>
            )}
          </div>
        </div>

        {/* Footer */}
        <div className="px-5 py-3 border-t border-slate-100 bg-slate-50/50 flex items-center justify-between">
          <span className="text-[11px] text-slate-500">Changes apply on the next ingestion run (06:00 UTC).</span>
          <button
            onClick={onClose}
            className="h-9 px-4 rounded-lg border border-slate-200 bg-white text-sm text-slate-700 hover:bg-slate-50 font-medium"
          >
            Done
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------- App ---------- */
function App() {
  const L = useLucide();
  const routerNavigate = useNavigate();

  // Auth guard: bounce to /login if no JWT in either store.
  // Preview/dev escape hatch: ?preview=1 or hostname matches a known preview sandbox
  // skips the guard so the design is viewable without a real token.
  const [authChecked, setAuthChecked] = useState(false);
  const [user, setUser] = useState({ email: 'User', initials: 'U' });
  useEffect(() => {
    const isPreview =
      /[?&]preview=1\b/.test(window.location.search) ||
      /\.(usercontent|claude|anthropic|webcontainer|stackblitz)\./i.test(window.location.hostname) ||
      window.location.hostname === 'localhost' && window.location.protocol === 'blob:' ||
      window.self !== window.top; // running inside an iframe (preview)

    const token = getStoredToken();
    if (!token) {
      if (isPreview) {
        // Render with a demo user so the UI is browsable.
        setUser({ email: 'demo@scholarslate.app', initials: 'DS' });
        setAuthChecked(true);
        return;
      }
      routerNavigate('/login', { replace: true });
      return;
    }
    const payload = decodeJwt(token);
    const email = (payload && (payload.email || payload.sub || payload.user)) || null;
    setUser({
      email: email || 'User',
      initials: email ? emailToInitials(email) : 'U',
    });
    setAuthChecked(true);
  }, []);

  const handleLogout = () => {
    clearAuth();
    routerNavigate('/login', { replace: true });
  };

  const [papers, setPapers] = useState([]);
  const [papersLoading, setPapersLoading] = useState(true);
  const [papersError, setPapersError] = useState(null);
  const [favorites, setFavorites] = useState([]);
  const [favLoading, setFavLoading] = useState(false);
  const [favError, setFavError] = useState(null);
  const [favLoaded, setFavLoaded] = useState(false);
  const [topics, setTopics] = useState([]);
  const [topicsLoading, setTopicsLoading] = useState(true);
  const [topicsError, setTopicsError] = useState(null);
  const [topicsManagerOpen, setTopicsManagerOpen] = useState(false);
  const [notifications, setNotifications] = useState([]);
  const [notifLoading, setNotifLoading] = useState(true);
  const [notifError, setNotifError] = useState(null);

  // Fetch topics once auth is settled.
  const loadTopics = () => {
    setTopicsLoading(true);
    setTopicsError(null);
    return fetchTopics()
      .then(data => {
        const list = Array.isArray(data) ? data : [];
        setTopics(list);
        setTopicsLoading(false);
        return list;
      })
      .catch(err => {
        if (err && err.code === 401) { clearAuth(); routerNavigate('/login', { replace: true }); return; }
        setTopicsError('Failed to load topics');
        setTopicsLoading(false);
        throw err;
      });
  };

  useEffect(() => {
    if (!authChecked) return;
    loadTopics().catch(() => {});
  }, [authChecked]);

  // Fetch notifications once auth is settled.
  useEffect(() => {
    if (!authChecked) return;
    let cancelled = false;
    setNotifLoading(true);
    setNotifError(null);
    fetchNotifications()
      .then(data => {
        if (cancelled) return;
        setNotifications(Array.isArray(data) ? data : []);
        setNotifLoading(false);
      })
      .catch(err => {
        if (cancelled) return;
        if (err && err.code === 401) { clearAuth(); routerNavigate('/login', { replace: true }); return; }
        setNotifError('Failed to load notifications');
        setNotifLoading(false);
      });
    return () => { cancelled = true; };
  }, [authChecked]);

  // Fetch papers from backend once auth is settled.
  useEffect(() => {
    if (!authChecked) return;
    let cancelled = false;
    setPapersLoading(true);
    setPapersError(null);
    fetchPapers()
      .then(data => {
        if (cancelled) return;
        // COMPLETED is the canonical "done" status from backend; normalize to DONE
        // so existing client filters keep working.
        const normalized = (Array.isArray(data) ? data : []).map(p => ({
          ...p,
          processing_status: p.processing_status === 'COMPLETED' ? 'DONE' : p.processing_status,
        }));
        setPapers(normalized);
        setPapersLoading(false);
      })
      .catch(err => {
        if (cancelled) return;
        if (err && err.code === 401) {
          clearAuth();
          routerNavigate('/login', { replace: true });
          return;
        }
        setPapersError('Failed to load papers');
        setPapersLoading(false);
      });
    return () => { cancelled = true; };
  }, [authChecked]);

  const [active, setActive] = useState('feed');
  const [mobileNav, setMobileNav] = useState(false);
  const [query, setQuery] = useState('');
  const [searchQuery, setSearchQuery] = useState('');
  const [sort, setSort] = useState('recent');
  const [filter, setFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('done'); // done | all | pending | failed
  const [topicFilter, setTopicFilter] = useState(null);
  const [focusPaperId, setFocusPaperId] = useState(null);

  const unreadNotifs = useMemo(() => notifications.filter(n => !n.is_read).length, [notifications]);

  // Today = published within last 24h (the "fresh from this morning's fetch" filter)
  const isToday = (p) => {
    const d = +new Date(p.published_at);
    return Date.now() - d < 24 * 60 * 60 * 1000;
  };

  // Feed filter chain — applied in order, each fix is intentional
  const filtered = useMemo(() => {
    let list = papers.slice();

    // status filter (default: DONE only, per UC02 spec)
    if (statusFilter === 'done') list = list.filter(p => p.processing_status === 'DONE');
    else if (statusFilter === 'pending') list = list.filter(p => p.processing_status === 'PENDING');
    else if (statusFilter === 'failed') list = list.filter(p => p.processing_status === 'FAILED');
    // 'all' = no status filter

    // topic filter (sidebar click)
    if (topicFilter) list = list.filter(p => p.topics?.includes(topicFilter));

    // global topbar query (live filter)
    if (query.trim()) {
      const q = query.toLowerCase();
      list = list.filter(p =>
        p.title.toLowerCase().includes(q) ||
        p.arxiv_id.includes(q) ||
        authorsLower(p.authors).includes(q) ||
        p.abstract.toLowerCase().includes(q)
      );
    }

    // tab filter
    if (filter === 'high') list = list.filter(p => p.quality_score != null && p.quality_score >= 8);
    if (filter === 'flagged') list = list.filter(p => p.is_duplicate || p.processing_status === 'FAILED');
    if (filter === 'today') list = list.filter(isToday);

    // sort
    if (sort === 'recent') list.sort((a, b) => +new Date(b.published_at) - +new Date(a.published_at));
    if (sort === 'oldest') list.sort((a, b) => +new Date(a.published_at) - +new Date(b.published_at));
    if (sort === 'score') list.sort((a, b) => (b.quality_score ?? -1) - (a.quality_score ?? -1));
    return list;
  }, [papers, query, sort, filter, statusFilter, topicFilter]);

  // Tab badge counts — derived from the same DONE/topic/query base, but ignoring the active tab itself
  const tabCounts = useMemo(() => {
    let base = papers.slice();
    if (statusFilter === 'done') base = base.filter(p => p.processing_status === 'DONE');
    else if (statusFilter === 'pending') base = base.filter(p => p.processing_status === 'PENDING');
    else if (statusFilter === 'failed') base = base.filter(p => p.processing_status === 'FAILED');
    if (topicFilter) base = base.filter(p => p.topics?.includes(topicFilter));
    if (query.trim()) {
      const q = query.toLowerCase();
      base = base.filter(p =>
        p.title.toLowerCase().includes(q) ||
        p.arxiv_id.includes(q) ||
        authorsLower(p.authors).includes(q) ||
        p.abstract.toLowerCase().includes(q)
      );
    }
    return {
      today: base.filter(isToday).length,
      high: base.filter(p => p.quality_score != null && p.quality_score >= 8).length,
      // flagged is shown across all statuses regardless of statusFilter
      flagged: papers.filter(p => p.is_duplicate || p.processing_status === 'FAILED').length,
    };
  }, [papers, statusFilter, topicFilter, query]);

  const favoritePapers = favorites;

  // Sidebar nav badges — real, derived counts
  const navCounts = useMemo(() => ({
    feed: papers.filter(p => p.processing_status === 'DONE').length,
    favorites: favoritePapers.length,
    notifications: unreadNotifs,
  }), [papers, favoritePapers.length, unreadNotifs]);

  const toggleFav = async (id) => {
    const paper = papers.find(p => p.id === id);
    const wasFav = !!(paper && paper.is_favorite);
    // Optimistic local flip
    setPapers(ps => ps.map(p => p.id === id ? { ...p, is_favorite: !p.is_favorite } : p));
    try {
      if (wasFav) {
        await removeFavorite(id);
        setFavorites(fs => fs.filter(p => p.id !== id));
      } else {
        await addFavorite(id);
        if (paper) setFavorites(fs => fs.some(f => f.id === id) ? fs : [...fs, { ...paper, is_favorite: true }]);
      }
    } catch (err) {
      // Rollback on error
      setPapers(ps => ps.map(p => p.id === id ? { ...p, is_favorite: wasFav } : p));
      if (err && err.code === 401) { clearAuth(); routerNavigate('/login', { replace: true }); }
    }
  };

  // Remove from Favorites view: DELETE then drop locally without refetch.
  const removeFromFavorites = async (id) => {
    const prev = favorites;
    setFavorites(fs => fs.filter(p => p.id !== id));
    setPapers(ps => ps.map(p => p.id === id ? { ...p, is_favorite: false } : p));
    try {
      await removeFavorite(id);
    } catch (err) {
      setFavorites(prev);
      setPapers(ps => ps.map(p => p.id === id ? { ...p, is_favorite: true } : p));
      if (err && err.code === 401) { clearAuth(); routerNavigate('/login', { replace: true }); }
    }
  };

  // Lazy-load favorites the first time the user opens that view.
  useEffect(() => {
    if (active !== 'favorites' || favLoaded || favLoading) return;
    setFavLoading(true);
    setFavError(null);
    fetchFavorites()
      .then(data => {
        const list = (Array.isArray(data) ? data : []).map(p => ({
          ...p,
          is_favorite: true,
          processing_status: p.processing_status === 'COMPLETED' ? 'DONE' : p.processing_status,
        }));
        setFavorites(list);
        setFavLoaded(true);
        setFavLoading(false);
      })
      .catch(err => {
        if (err && err.code === 401) { clearAuth(); routerNavigate('/login', { replace: true }); return; }
        setFavError('Failed to load favorites');
        setFavLoading(false);
      });
  }, [active, favLoaded, favLoading]);

  const markAllRead = async () => {
    const prev = notifications;
    setNotifications(ns => ns.map(n => ({ ...n, is_read: true })));
    try { await markAllNotificationsRead(); }
    catch (err) {
      setNotifications(prev);
      if (err && err.code === 401) { clearAuth(); routerNavigate('/login', { replace: true }); }
    }
  };
  const markOneRead = async (id) => {
    const prev = notifications;
    setNotifications(ns => ns.map(n => n.id === id ? { ...n, is_read: true } : n));
    try { await markNotificationRead(id); }
    catch (err) {
      setNotifications(prev);
      if (err && err.code === 401) { clearAuth(); routerNavigate('/login', { replace: true }); }
    }
  };

  const navigate = (v) => {
    setActive(v);
    setMobileNav(false);
    // when leaving feed, clear topic filter so re-entering shows everything
    if (v !== 'feed') setTopicFilter(null);
  };

  const onTopicClick = (name) => {
    setTopicFilter(name);
    setActive('feed');
    setMobileNav(false);
  };

  const onSubmitQuery = (q) => {
    // Topbar "submit" routes to full Search page with the query pre-filled
    setSearchQuery(q);
    setActive('search');
  };

  // Open a specific paper from a notification: clear filters that might hide it,
  // navigate to feed, and pass focusPaperId so PaperCard auto-expands and scrolls.
  const openPaper = (paperId) => {
    const paper = papers.find(p => p.id === paperId);
    if (!paper) return;
    setQuery('');
    setFilter('all');
    setStatusFilter('all'); // ensure non-DONE papers (e.g. duplicate) are visible
    setTopicFilter(null);
    setActive('feed');
    setMobileNav(false);
    // Mark the source notification (if any) as read
    setNotifications(ns => ns.map(n => n.paper_id === paperId ? { ...n, is_read: true } : n));
    // Set focus after the feed has had a chance to render
    setFocusPaperId(null);
    requestAnimationFrame(() => requestAnimationFrame(() => setFocusPaperId(paperId)));
  };

  if (!authChecked) {
    return <div className="h-screen w-screen flex items-center justify-center text-slate-400 text-sm">Authenticating…</div>;
  }
  if (!L) {
    return <div className="h-screen w-screen flex items-center justify-center text-slate-400 text-sm">Loading…</div>;
  }

  return (
    <div className="h-screen w-screen flex bg-slate-50 text-slate-900">
      <Sidebar
        L={L}
        active={active}
        onNavigate={navigate}
        topics={topics}
        topicsLoading={topicsLoading}
        onManageTopics={() => setTopicsManagerOpen(true)}
        mobileOpen={mobileNav}
        onClose={() => setMobileNav(false)}
        navCounts={navCounts}
        topicFilter={topicFilter}
        onTopicClick={onTopicClick}
      />

      <div className="flex-1 flex flex-col min-w-0">
        <Topbar
          L={L}
          onMobileMenu={() => setMobileNav(true)}
          query={query}
          onQuery={setQuery}
          onSubmitQuery={onSubmitQuery}
          notifications={notifications}
          onMarkAllRead={markAllRead}
          onMarkOneRead={markOneRead}
          onOpenNotifications={() => navigate('notifications')}
          onNavigate={navigate}
          onOpenPaper={openPaper}
          user={user}
          onLogout={handleLogout}
        />

        <main className="flex-1 overflow-y-auto feed-scroll">
          <div className="max-w-4xl mx-auto px-4 lg:px-6 py-6">
            {active === 'feed' ? (
              <FeedView
                L={L}
                papers={filtered}
                loading={papersLoading}
                error={papersError}
                sort={sort} onSort={setSort}
                filter={filter} onFilter={setFilter}
                statusFilter={statusFilter} onStatusFilter={setStatusFilter}
                todayCount={tabCounts.today}
                highCount={tabCounts.high}
                flaggedCount={tabCounts.flagged}
                onToggleFavorite={toggleFav}
                topicFilter={topicFilter}
                focusPaperId={focusPaperId}
                onFocusConsumed={() => setFocusPaperId(null)}
              />
            ) : null}
            {active === 'favorites' ? (
              <FavoritesView L={L} papers={favoritePapers} loading={favLoading} error={favError} onRemoveFavorite={removeFromFavorites} />
            ) : null}
            {active === 'notifications' ? (
              <NotificationsView L={L} items={notifications} loading={notifLoading} error={notifError} onMarkAllRead={markAllRead} onMarkOneRead={markOneRead} onOpenPaper={openPaper} />
            ) : null}
            {active === 'search' ? (
              <SearchView L={L} onToggleFavorite={toggleFav} initialQuery={searchQuery} onAuthError={() => { clearAuth(); routerNavigate('/login', { replace: true }); }} />
            ) : null}
            {active === 'trends' ? (
              <TrendsView L={L} onAuthError={() => { clearAuth(); routerNavigate('/login', { replace: true }); }} />
            ) : null}
          </div>
        </main>
      </div>

      <TopicsManager
        L={L}
        open={topicsManagerOpen}
        onClose={() => setTopicsManagerOpen(false)}
        topics={topics}
        onChange={setTopics}
        onAuthError={() => { clearAuth(); routerNavigate('/login', { replace: true }); }}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <BrowserRouter>
    <Routes>
      <Route path="*" element={<App />} />
    </Routes>
  </BrowserRouter>
);
</script>
</body>
</html>
