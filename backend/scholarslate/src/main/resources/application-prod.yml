# ============================================================
# application-prod.yml — Spring profile cho Production (Railway)
# Activate bằng env var: SPRING_PROFILES_ACTIVE=prod
# Tất cả secrets đọc từ environment variables — KHÔNG hardcode
# ============================================================

server:
  # Railway inject PORT tự động; fallback 8080 nếu chạy local với profile prod
  port: ${PORT:8080}

spring:
  datasource:
    # Railway DB URL dạng: postgresql://user:pass@host:port/db
    # Spring cần jdbc:postgresql:// — Railway tự inject DATABASE_URL dạng postgres://
    # Dùng JDBC_DATABASE_URL để tránh phải parse lại
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 10          # Railway free tier: giới hạn connection
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      connection-init-sql: "SET hnsw.ef_search = 128"

  jpa:
    hibernate:
      ddl-auto: validate             # Flyway quản lý schema
    show-sql: false                  # Tắt SQL log ở production
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway dùng connection riêng, không có connection-init-sql
    url: ${JDBC_DATABASE_URL}
    user: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=3600s

# ── Actuator (Health Check cho Railway) ───────────────────────
management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: never            # Không lộ thông tin DB ra ngoài

jwt:
  secret: ${JWT_SECRET}              # openssl rand -base64 32
  expiration-ms: 86400000

# ── AI Services ───────────────────────────────────────────────
ai:
  groq:
    api-key: ${GROQ_API_KEY}
    model: llama-3.1-8b-instant
    max-summary-length: 2000

  huggingface:
    api-key: ${HUGGINGFACE_API_KEY}
    model: BAAI/bge-small-en-v1.5
    batch-size: 32
    retry-wait-on-503-ms: 30000

# ── Scheduler ─────────────────────────────────────────────────
scheduler:
  main:
    cron: "0 0 6 * * *"

  retry:
    fixed-delay-ms: 1800000

  arxiv:
    max-results-per-keyword: 10
    request-delay-ms: 350

  groq:
    call-delay-ms: 2000
    transient-retry-delay-ms: 5000
